version: "2"
sql:
  - engine: "postgresql"
    database: "postgres://postgres:password@localhost:5432/nextask?sslmode=disable"
    schema: "db/migrations"
    queries: "db/queries"
    gen:
      go:
        package: "queries"
        out: "internal/repository/queries"
        emit_json_tags: true
        emit_interface: true
        query_parameter_limit: 10
        override:
          - column: "uuid"
            type:
              go: "uuid.UUID"
            imports:
              - package: "github.com/google/uuid"
          - column: "timestamptz"
            type:
              go: "time.Time"
            imports:
              - package: "time"
        emit_prequeries: true
        emit_exact_tables: false
