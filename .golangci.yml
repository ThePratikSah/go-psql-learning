version: "2"
linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - revive
    - exhaustive
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/thepratiksah/nextask
    revive:
      rules:
        - name: exported
        - name: error-naming
        - name: error-return

linters-settings:
  errcheck:
    exclude:
      - fmt.Fprintln
      - fmt.Fprintf
  govet:
    enable:
      - shadow
      - unused

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-dirs:
    - tmp
    - vendor
